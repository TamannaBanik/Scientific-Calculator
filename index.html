<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="calculator">
      <div class="title">SCIENTIFIC CALCULATOR</div>
      <div class="status">
        <span id="modeIndicator">DEG</span>
      </div>
      <input id="display" readonly />
      <div id="keys">
        <button id="mode" class="func">DEG</button>
        <button class="func">sin</button>
        <button class="func">cos</button>
        <button class="func">tan</button>
        <button class="func">√</button>
        <button class="func">^</button>
        <button class="func">π</button>
        <button class="func">e</button>

        <button class="func">log</button>
        <button class="func">ln</button>
        <button>(</button>
        <button>)</button>

        <button class="no">7</button>
        <button class="no">8</button>
        <button class="no">9</button>
        <button class="op">/</button>

        <button class="no">4</button>
        <button class="no">5</button>
        <button class="no">6</button>
        <button class="op">*</button>

        <button class="no">1</button>
        <button class="no">2</button>
        <button class="no">3</button>
        <button class="op">-</button>

        <button class="no">0</button>
        <button class="no">.</button>
        <button class="no">=</button>
        <button class="op">+</button>

        <button class="danger">⌫</button>
        <button class="danger">C</button>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
